<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#17132B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Fahtzee</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23F72585'/><circle cx='30' cy='30' r='9' fill='white'/><circle cx='70' cy='30' r='9' fill='white'/><circle cx='50' cy='50' r='9' fill='white'/><circle cx='30' cy='70' r='9' fill='white'/><circle cx='70' cy='70' r='9' fill='white'/></svg>" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #17132B; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useCallback, useEffect, useRef } = React;

// ---------- Scoring logic ----------
const counts = (dice) => {
  const c = [0, 0, 0, 0, 0, 0];
  dice.forEach((d) => c[d - 1]++);
  return c;
};
const sum = (dice) => dice.reduce((a, b) => a + b, 0);

const SCORERS = {
  ones: (d) => counts(d)[0] * 1,
  twos: (d) => counts(d)[1] * 2,
  threes: (d) => counts(d)[2] * 3,
  fours: (d) => counts(d)[3] * 4,
  fives: (d) => counts(d)[4] * 5,
  sixes: (d) => counts(d)[5] * 6,
  threeKind: (d) => (counts(d).some((c) => c >= 3) ? sum(d) : 0),
  fourKind: (d) => (counts(d).some((c) => c >= 4) ? sum(d) : 0),
  fullHouse: (d) => {
    const c = counts(d).filter((x) => x > 0).sort();
    return (c.length === 2 && c[0] === 2 && c[1] === 3) || counts(d).some((x) => x === 5) ? 25 : 0;
  },
  smallStraight: (d) => {
    const s = new Set(d);
    const runs = [[1, 2, 3, 4], [2, 3, 4, 5], [3, 4, 5, 6]];
    return runs.some((r) => r.every((n) => s.has(n))) ? 30 : 0;
  },
  largeStraight: (d) => {
    const s = [...new Set(d)].sort().join("");
    return s === "12345" || s === "23456" ? 40 : 0;
  },
  fahtzee: (d) => (counts(d).some((c) => c === 5) ? 50 : 0),
  chance: (d) => sum(d),
};

const UPPER = [
  { key: "ones", label: "Ones" },
  { key: "twos", label: "Twos" },
  { key: "threes", label: "Threes" },
  { key: "fours", label: "Fours" },
  { key: "fives", label: "Fives" },
  { key: "sixes", label: "Sixes" },
];
const LOWER = [
  { key: "threeKind", label: "Three of a Kind" },
  { key: "fourKind", label: "Four of a Kind" },
  { key: "fullHouse", label: "Full House" },
  { key: "smallStraight", label: "Small Straight" },
  { key: "largeStraight", label: "Large Straight" },
  { key: "fahtzee", label: "FAHTZEE" },
  { key: "chance", label: "Chance" },
];

const PLAYER_COLOURS = ["#FFD23F", "#4CC9F0", "#F72585", "#80ED99"];

const totalsFor = (p) => {
  const upperSum = UPPER.reduce((a, { key }) => a + (p.scores[key] ?? 0), 0);
  const upperBonus = upperSum >= 63 ? 35 : 0;
  const lowerSum = LOWER.reduce((a, { key }) => a + (p.scores[key] ?? 0), 0);
  return {
    upperSum,
    upperBonus,
    lowerSum,
    grand: upperSum + upperBonus + lowerSum + p.yahtzeeBonuses * 100,
  };
};

// ---------- Dice pips ----------
const PIP_LAYOUTS = {
  1: [[1, 1]],
  2: [[0, 0], [2, 2]],
  3: [[0, 0], [1, 1], [2, 2]],
  4: [[0, 0], [0, 2], [2, 0], [2, 2]],
  5: [[0, 0], [0, 2], [1, 1], [2, 0], [2, 2]],
  6: [[0, 0], [0, 1], [0, 2], [2, 0], [2, 1], [2, 2]],
};

function Die({ value, held, onClick, rolling, disabled, blank }) {
  if (blank) {
    return (
      <div
        aria-label="Die not yet rolled"
        style={{
          width: 58,
          height: 58,
          borderRadius: 16,
          border: "2px dashed rgba(255,255,255,0.25)",
          background: "rgba(255,255,255,0.04)",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          color: "rgba(255,255,255,0.3)",
          fontSize: 22,
          fontWeight: 800,
        }}
      >
        ?
      </div>
    );
  }
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      aria-label={`Die showing ${value}${held ? ", held" : ""}`}
      style={{
        width: 58,
        height: 58,
        borderRadius: 16,
        border: "none",
        background: held
          ? "linear-gradient(160deg, #FFD23F, #FFA62B)"
          : "linear-gradient(160deg, #FFFFFF, #E8E6F0)",
        boxShadow: held
          ? "0 0 0 3px rgba(255,210,63,0.5), 0 6px 16px rgba(255,166,43,0.45)"
          : "0 6px 16px rgba(0,0,0,0.5)",
        cursor: disabled ? "default" : "pointer",
        padding: 8,
        transform: held ? "scale(0.92)" : "scale(1)",
        transition: "transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease",
        animation: rolling && !held ? "tumble 0.45s ease" : "none",
        outlineOffset: 3,
      }}
    >
      <div
        style={{
          display: "grid",
          gridTemplateColumns: "repeat(3, 1fr)",
          gridTemplateRows: "repeat(3, 1fr)",
          width: "100%",
          height: "100%",
        }}
      >
        {Array.from({ length: 9 }).map((_, i) => {
          const r = Math.floor(i / 3);
          const c = i % 3;
          const show = PIP_LAYOUTS[value].some(([pr, pc]) => pr === r && pc === c);
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
              {show && (
                <div
                  style={{
                    width: 9,
                    height: 9,
                    borderRadius: "50%",
                    background: "#1B1730",
                  }}
                />
              )}
            </div>
          );
        })}
      </div>
    </button>
  );
}

// ---------- Main app ----------
function Fahtzee() {
  // phase: "setup" | "handoff" | "playing" | "over"
  const [phase, setPhase] = useState("setup");
  const [nameInputs, setNameInputs] = useState(["", "", "", ""]);
  const [players, setPlayers] = useState([]);
  const [current, setCurrent] = useState(0);
  const [round, setRound] = useState(1);

  const [dice, setDice] = useState([1, 1, 1, 1, 1]);
  const [held, setHeld] = useState([false, false, false, false, false]);
  const [rollsLeft, setRollsLeft] = useState(3);
  const [rolling, setRolling] = useState(false);

  // Tie-break roll-off
  const [rolloff, setRolloff] = useState(null); // { contenders: [playerIdx], results: {playerIdx: sum} }
  const [rolloffDice, setRolloffDice] = useState(null);
  const [rolloffRolling, setRolloffRolling] = useState(false);

  // Shake to roll
  const [shakeStatus, setShakeStatus] = useState("unknown"); // unknown | needsPermission | on | unavailable
  const lastShakeRef = useRef(0);
  const stateRef = useRef({});
  stateRef.current = { phase, rollsLeft, rolling };

  const hasRolled = rollsLeft < 3;
  const player = players[current];

  const doRoll = useCallback(() => {
    setRolling(true);
    let ticks = 0;
    const interval = setInterval(() => {
      setDice((prev) => prev.map((d, i) => (held[i] ? d : 1 + Math.floor(Math.random() * 6))));
      ticks++;
      if (ticks >= 7) {
        clearInterval(interval);
        setRolling(false);
        setRollsLeft((r) => r - 1);
      }
    }, 60);
  }, [held]);

  const roll = useCallback(() => {
    if (rollsLeft === 0 || rolling || phase !== "playing") return;
    doRoll();
  }, [rollsLeft, rolling, phase, doRoll]);

  const rollRef = useRef(roll);
  rollRef.current = roll;

  const handleMotion = useCallback((e) => {
    const a = e.accelerationIncludingGravity;
    if (!a) return;
    const magnitude = Math.sqrt((a.x || 0) ** 2 + (a.y || 0) ** 2 + (a.z || 0) ** 2);
    // Gravity alone is ~9.8; a real shake spikes well past 22
    if (magnitude > 24) {
      const now = Date.now();
      const { phase: ph, rollsLeft: rl, rolling: ro } = stateRef.current;
      if (now - lastShakeRef.current > 1400 && ph === "playing" && rl > 0 && !ro) {
        lastShakeRef.current = now;
        rollRef.current();
      }
    }
  }, []);

  useEffect(() => {
    if (typeof window === "undefined" || typeof window.DeviceMotionEvent === "undefined") {
      setShakeStatus("unavailable");
      return;
    }
    if (typeof window.DeviceMotionEvent.requestPermission === "function") {
      // iOS: needs a user gesture to grant
      setShakeStatus("needsPermission");
    } else {
      window.addEventListener("devicemotion", handleMotion);
      setShakeStatus("on");
    }
    return () => window.removeEventListener("devicemotion", handleMotion);
  }, [handleMotion]);

  const enableShake = async () => {
    try {
      const res = await window.DeviceMotionEvent.requestPermission();
      if (res === "granted") {
        window.addEventListener("devicemotion", handleMotion);
        setShakeStatus("on");
      } else {
        setShakeStatus("unavailable");
      }
    } catch {
      setShakeStatus("unavailable");
    }
  };

  const startGame = () => {
    const named = nameInputs.map((n) => n.trim()).filter(Boolean);
    if (named.length < 2) return;
    setPlayers(named.map((name) => ({ name, scores: {}, yahtzeeBonuses: 0 })));
    setCurrent(0);
    setRound(1);
    setHeld([false, false, false, false, false]);
    setRollsLeft(3);
    setPhase("handoff");
  };

  const toggleHold = (i) => {
    if (!hasRolled) return;
    setHeld((h) => h.map((v, j) => (j === i ? !v : v)));
  };

  const scoreCategory = (key) => {
    if (!player || player.scores[key] !== undefined || !hasRolled || rolling) return;
    let pts = SCORERS[key](dice);
    let bonus = 0;
    const isFive = counts(dice).some((c) => c === 5);
    if (isFive && player.scores.fahtzee === 50 && key !== "fahtzee") {
      bonus = 1;
      if (key === "fullHouse") pts = 25;
      if (key === "smallStraight") pts = 30;
      if (key === "largeStraight") pts = 40;
    }
    const updated = players.map((p, i) =>
      i === current
        ? { ...p, scores: { ...p.scores, [key]: pts }, yahtzeeBonuses: p.yahtzeeBonuses + bonus }
        : p
    );
    setPlayers(updated);
    setHeld([false, false, false, false, false]);
    setRollsLeft(3);

    const next = (current + 1) % updated.length;
    const finished = updated.every((p) => Object.keys(p.scores).length === 13);
    if (finished) {
      setPhase("over");
    } else {
      if (next === 0) setRound((r) => r + 1);
      setCurrent(next);
      setPhase("handoff");
    }
  };

  const newGame = () => {
    setPhase("setup");
    setPlayers([]);
    setRolloff(null);
    setRolloffDice(null);
    setRolloffRolling(false);
  };

  // ---------- Shared shell ----------
  const shell = (children) => (
    <div
      style={{
        minHeight: "100vh",
        background: "linear-gradient(180deg, #17132B 0%, #201A3D 55%, #17132B 100%)",
        fontFamily: "'Avenir Next', 'Segoe UI', system-ui, sans-serif",
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        padding: "22px 12px 48px",
        color: "#F5F3FA",
      }}
    >
      <style>{`
        @keyframes tumble {
          0% { transform: rotate(0deg) scale(1); }
          30% { transform: rotate(-16deg) scale(1.1); }
          60% { transform: rotate(12deg) scale(0.94); }
          100% { transform: rotate(0deg) scale(1); }
        }
        @keyframes pop {
          0% { transform: scale(0.6); opacity: 0; }
          70% { transform: scale(1.06); }
          100% { transform: scale(1); opacity: 1; }
        }
        @media (prefers-reduced-motion: reduce) {
          * { animation: none !important; transition: none !important; }
        }
        button:focus-visible, input:focus-visible { outline: 3px solid #FFD23F; }
        input::placeholder { color: rgba(245,243,250,0.35); }
      `}</style>
      <h1
        style={{
          fontSize: 42,
          fontWeight: 900,
          letterSpacing: "-0.02em",
          margin: "0 0 2px",
          background: "linear-gradient(90deg, #FFD23F, #F72585, #4CC9F0)",
          WebkitBackgroundClip: "text",
          WebkitTextFillColor: "transparent",
          transform: "rotate(-2deg)",
        }}
      >
        FAHTZEE
      </h1>
      {children}
    </div>
  );

  const bigButton = (label, onClick, disabled) => (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        fontFamily: "inherit",
        fontSize: 18,
        fontWeight: 800,
        letterSpacing: "0.02em",
        padding: "14px 42px",
        borderRadius: 16,
        border: "none",
        background: disabled
          ? "rgba(255,255,255,0.08)"
          : "linear-gradient(90deg, #F72585, #B5179E)",
        color: disabled ? "rgba(245,243,250,0.35)" : "#FFF",
        cursor: disabled ? "default" : "pointer",
        boxShadow: disabled ? "none" : "0 6px 20px rgba(247,37,133,0.4)",
        transition: "transform 0.1s ease",
      }}
    >
      {label}
    </button>
  );

  // ---------- Setup screen ----------
  if (phase === "setup") {
    const namedCount = nameInputs.filter((n) => n.trim()).length;
    return shell(
      <>
        <p style={{ color: "rgba(245,243,250,0.6)", margin: "4px 0 24px", fontSize: 14 }}>
          Pass and play · enter 2 to 4 names
        </p>
        <div
          style={{
            width: "100%",
            maxWidth: 380,
            background: "rgba(255,255,255,0.06)",
            border: "1px solid rgba(255,255,255,0.1)",
            borderRadius: 20,
            padding: "22px 20px",
            display: "flex",
            flexDirection: "column",
            gap: 14,
            backdropFilter: "blur(6px)",
          }}
        >
          {nameInputs.map((val, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div
                style={{
                  width: 14,
                  height: 14,
                  borderRadius: "50%",
                  background: PLAYER_COLOURS[i],
                  flexShrink: 0,
                  boxShadow: `0 0 10px ${PLAYER_COLOURS[i]}66`,
                }}
              />
              <input
                value={val}
                onChange={(e) =>
                  setNameInputs((n) => n.map((v, j) => (j === i ? e.target.value : v)))
                }
                placeholder={i < 2 ? `Player ${i + 1}` : `Player ${i + 1} (optional)`}
                maxLength={14}
                style={{
                  flex: 1,
                  fontFamily: "inherit",
                  fontSize: 17,
                  padding: "11px 14px",
                  borderRadius: 12,
                  border: "1px solid rgba(255,255,255,0.14)",
                  background: "rgba(0,0,0,0.25)",
                  color: "#F5F3FA",
                }}
              />
            </div>
          ))}
          <div style={{ textAlign: "center", marginTop: 8 }}>
            {bigButton("Let's Go", startGame, namedCount < 2)}
          </div>
          {namedCount < 2 && (
            <p style={{ textAlign: "center", fontSize: 13, color: "rgba(245,243,250,0.45)", margin: 0 }}>
              Enter at least two names to start
            </p>
          )}
        </div>
      </>
    );
  }

  // ---------- Handoff screen ----------
  if (phase === "handoff") {
    return shell(
      <>
        <p style={{ color: "rgba(245,243,250,0.6)", margin: "4px 0 44px", fontSize: 14 }}>
          Round {round} of 13
        </p>
        <div
          style={{
            animation: "pop 0.35s ease",
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            background: "rgba(255,255,255,0.06)",
            border: `2px solid ${PLAYER_COLOURS[current]}`,
            borderRadius: 24,
            padding: "30px 40px",
            marginBottom: 30,
            boxShadow: `0 0 30px ${PLAYER_COLOURS[current]}33`,
          }}
        >
          <div style={{ fontSize: 15, color: "rgba(245,243,250,0.6)", marginBottom: 6 }}>
            Pass the phone to
          </div>
          <div style={{ fontSize: 34, fontWeight: 900, color: PLAYER_COLOURS[current], marginBottom: 18 }}>
            {player.name}
          </div>
          {bigButton("I'm Ready", () => setPhase("playing"))}
        </div>

        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
          {players.map((p, i) => (
            <div
              key={i}
              style={{
                background: "rgba(255,255,255,0.06)",
                border: `1px solid ${i === current ? PLAYER_COLOURS[i] : "rgba(255,255,255,0.1)"}`,
                borderRadius: 14,
                padding: "8px 14px",
                fontSize: 14,
                textAlign: "center",
                minWidth: 74,
              }}
            >
              <div style={{ color: PLAYER_COLOURS[i], fontWeight: 800 }}>{p.name}</div>
              <div style={{ fontVariantNumeric: "tabular-nums", fontWeight: 700 }}>{totalsFor(p).grand}</div>
            </div>
          ))}
        </div>
      </>
    );
  }

  // ---------- Game over screen ----------
  if (phase === "over") {
    const ranked = players
      .map((p, i) => ({ ...p, idx: i, colour: PLAYER_COLOURS[i], total: totalsFor(p).grand }))
      .sort((a, b) => b.total - a.total);
    const topScore = ranked[0].total;
    const tiedForFirst = ranked.filter((p) => p.total === topScore);
    const isTie = tiedForFirst.length > 1;

    // Competition ranking: tied players share the same position (1, 1, 3...)
    const positionOf = (p) => 1 + ranked.filter((q) => q.total > p.total).length;
    const positionLabel = (p) => {
      const pos = positionOf(p);
      const shared = ranked.filter((q) => positionOf(q) === pos).length > 1;
      return `${pos}${shared ? "=" : ""}`;
    };

    // Roll-off state
    const nextToRoll = rolloff
      ? rolloff.contenders.find((c) => rolloff.results[c] === undefined)
      : undefined;
    const rolloffDone = rolloff && nextToRoll === undefined;
    let rolloffWinnerIdx = null;
    let stillTied = [];
    if (rolloffDone) {
      const max = Math.max(...rolloff.contenders.map((c) => rolloff.results[c]));
      stillTied = rolloff.contenders.filter((c) => rolloff.results[c] === max);
      if (stillTied.length === 1) rolloffWinnerIdx = stillTied[0];
    }

    const rollForContender = (cIdx) => {
      if (rolloffRolling) return;
      setRolloffRolling(true);
      let ticks = 0;
      const interval = setInterval(() => {
        const vals = Array.from({ length: 5 }, () => 1 + Math.floor(Math.random() * 6));
        setRolloffDice(vals);
        ticks++;
        if (ticks >= 7) {
          clearInterval(interval);
          const s = vals.reduce((a, b) => a + b, 0);
          setRolloff((r) => ({ ...r, results: { ...r.results, [cIdx]: s } }));
          setRolloffRolling(false);
        }
      }, 60);
    };

    const startRolloff = (contenders) => {
      setRolloff({ contenders, results: {} });
      setRolloffDice(null);
    };

    const headline = rolloffWinnerIdx !== null
      ? `${players[rolloffWinnerIdx].name} wins the roll-off`
      : isTie
      ? `Tie at the top on ${topScore}`
      : `${tiedForFirst[0].name} wins with ${topScore}`;

    return shell(
      <>
        <div style={{ fontSize: 50, margin: "18px 0 6px" }}>{isTie && rolloffWinnerIdx === null ? "⚔️" : "🏆"}</div>
        <div style={{ fontSize: 26, fontWeight: 900, marginBottom: 20, textAlign: "center", animation: "pop 0.4s ease" }}>
          {headline}
        </div>

        {/* Roll-off panel */}
        {isTie && (
          <div
            style={{
              width: "100%",
              maxWidth: 380,
              background: "rgba(255,255,255,0.06)",
              border: "1px solid rgba(255,210,63,0.4)",
              borderRadius: 20,
              padding: "18px 18px 20px",
              marginBottom: 22,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 12,
            }}
          >
            {!rolloff && (
              <>
                <div style={{ fontSize: 14, color: "rgba(245,243,250,0.7)", textAlign: "center" }}>
                  Scores level. Settle it sudden death: one roll of five dice each, highest total takes the crown.
                </div>
                {bigButton("Start Roll-Off", () => startRolloff(tiedForFirst.map((p) => p.idx)))}
              </>
            )}

            {rolloff && (
              <>
                {rolloffDice && (
                  <div style={{ display: "flex", gap: 8 }}>
                    {rolloffDice.map((d, i) => (
                      <Die key={i} value={d} held={false} rolling={rolloffRolling} disabled />
                    ))}
                  </div>
                )}
                <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 6 }}>
                  {rolloff.contenders.map((cIdx) => (
                    <div
                      key={cIdx}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: 10,
                        padding: "8px 12px",
                        borderRadius: 12,
                        background: cIdx === nextToRoll ? "rgba(255,210,63,0.12)" : "rgba(0,0,0,0.2)",
                        border: `1px solid ${cIdx === rolloffWinnerIdx ? "#FFD23F" : "rgba(255,255,255,0.08)"}`,
                      }}
                    >
                      <div style={{ width: 10, height: 10, borderRadius: "50%", background: PLAYER_COLOURS[cIdx] }} />
                      <span style={{ flex: 1, fontWeight: 800, fontSize: 15 }}>{players[cIdx].name}</span>
                      <span style={{ fontVariantNumeric: "tabular-nums", fontWeight: 800, fontSize: 16 }}>
                        {rolloff.results[cIdx] !== undefined ? rolloff.results[cIdx] : "—"}
                      </span>
                    </div>
                  ))}
                </div>
                {nextToRoll !== undefined &&
                  bigButton(
                    rolloffRolling ? "Rolling…" : `${players[nextToRoll].name}, Roll!`,
                    () => rollForContender(nextToRoll),
                    rolloffRolling
                  )}
                {rolloffDone && stillTied.length > 1 && (
                  <>
                    <div style={{ fontSize: 14, color: "rgba(245,243,250,0.7)" }}>Still level. Go again.</div>
                    {bigButton("Roll Again", () => startRolloff(stillTied))}
                  </>
                )}
              </>
            )}
          </div>
        )}

        <div
          style={{
            width: "100%",
            maxWidth: 380,
            background: "rgba(255,255,255,0.06)",
            border: "1px solid rgba(255,255,255,0.1)",
            borderRadius: 20,
            overflow: "hidden",
            marginBottom: 30,
          }}
        >
          {ranked.map((p, i) => {
            const isChamp = rolloffWinnerIdx !== null ? p.idx === rolloffWinnerIdx : p.total === topScore && !isTie;
            return (
              <div
                key={p.name + i}
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 12,
                  padding: "13px 18px",
                  borderBottom: i < ranked.length - 1 ? "1px solid rgba(255,255,255,0.08)" : "none",
                  background: isChamp
                    ? "rgba(255,210,63,0.14)"
                    : p.total === topScore
                    ? "rgba(255,210,63,0.06)"
                    : "transparent",
                }}
              >
                <span style={{ fontWeight: 800, color: "rgba(245,243,250,0.5)", width: 28 }}>{positionLabel(p)}</span>
                <div style={{ width: 12, height: 12, borderRadius: "50%", background: p.colour }} />
                <span style={{ flex: 1, fontWeight: 800, fontSize: 16 }}>
                  {p.name} {isChamp ? "👑" : ""}
                </span>
                <span style={{ fontVariantNumeric: "tabular-nums", fontWeight: 800, fontSize: 18 }}>{p.total}</span>
              </div>
            );
          })}
        </div>
        {bigButton("Play Again", newGame)}
      </>
    );
  }

  // ---------- Playing screen ----------
  const t = totalsFor(player);
  const scoredCount = Object.keys(player.scores).length;

  const Row = ({ cat }) => {
    const scored = player.scores[cat.key] !== undefined;
    const preview = hasRolled && !scored ? SCORERS[cat.key](dice) : null;

    if (scored) {
      return (
        <div
          style={{
            display: "flex",
            justifyContent: "space-between",
            alignItems: "center",
            width: "100%",
            padding: "8px 16px",
            borderBottom: "1px solid rgba(255,255,255,0.06)",
            fontSize: 14,
            color: "rgba(245,243,250,0.35)",
          }}
        >
          <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: "#80ED99", fontSize: 13 }}>✓</span>
            <span style={{ textDecoration: "line-through", textDecorationColor: "rgba(245,243,250,0.25)" }}>
              {cat.label}
            </span>
          </span>
          <span style={{ fontVariantNumeric: "tabular-nums", fontWeight: 700 }}>{player.scores[cat.key]}</span>
        </div>
      );
    }

    return (
      <button
        onClick={() => scoreCategory(cat.key)}
        disabled={!hasRolled || rolling}
        style={{
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
          width: "100%",
          padding: "10px 16px",
          background: "rgba(255,255,255,0.03)",
          border: "none",
          borderLeft: `3px solid ${hasRolled ? PLAYER_COLOURS[current] : "rgba(255,255,255,0.15)"}`,
          borderBottom: "1px solid rgba(255,255,255,0.06)",
          cursor: hasRolled ? "pointer" : "default",
          fontFamily: "inherit",
          fontSize: 15,
          color: "#F5F3FA",
          fontWeight: 600,
          transition: "background 0.12s ease",
        }}
        onMouseEnter={(e) => {
          if (hasRolled) e.currentTarget.style.background = "rgba(247,37,133,0.12)";
        }}
        onMouseLeave={(e) => {
          e.currentTarget.style.background = "rgba(255,255,255,0.03)";
        }}
      >
        <span style={{ letterSpacing: cat.key === "fahtzee" ? "0.04em" : 0, fontWeight: cat.key === "fahtzee" ? 900 : 600 }}>
          {cat.label}
        </span>
        {preview !== null ? (
          <span
            style={{
              fontVariantNumeric: "tabular-nums",
              fontWeight: 800,
              fontSize: 14,
              padding: "3px 12px",
              borderRadius: 999,
              background: preview > 0 ? "rgba(128,237,153,0.16)" : "rgba(255,255,255,0.07)",
              color: preview > 0 ? "#80ED99" : "rgba(245,243,250,0.45)",
            }}
          >
            +{preview}
          </span>
        ) : (
          <span style={{ color: "rgba(245,243,250,0.3)", fontSize: 14 }}>open</span>
        )}
      </button>
    );
  };

  return shell(
    <>
      {/* Turn banner */}
      <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "0 0 2px" }}>
        <div style={{ width: 12, height: 12, borderRadius: "50%", background: PLAYER_COLOURS[current], boxShadow: `0 0 10px ${PLAYER_COLOURS[current]}88` }} />
        <span style={{ fontSize: 18, fontWeight: 800 }}>{player.name}</span>
        <span style={{ color: "rgba(245,243,250,0.5)", fontSize: 13 }}>· Round {round}/13 · {13 - scoredCount} to fill</span>
      </div>
      <p style={{ color: "rgba(245,243,250,0.55)", margin: "2px 0 14px", fontSize: 13 }}>
        {hasRolled
          ? "Tap dice to hold · tap a category to bank your score"
          : shakeStatus === "on"
          ? "Shake your phone or hit the button to roll"
          : "Hit the button to roll"}
      </p>

      {/* Dice tray */}
      <div
        style={{
          display: "flex",
          gap: 10,
          padding: "18px 20px",
          background: "rgba(0,0,0,0.3)",
          borderRadius: 22,
          border: "1px solid rgba(255,255,255,0.1)",
          marginBottom: 14,
        }}
      >
        {dice.map((d, i) => (
          <Die
            key={i}
            value={d}
            held={held[i]}
            rolling={rolling}
            disabled={!hasRolled}
            blank={!hasRolled && !rolling}
            onClick={() => toggleHold(i)}
          />
        ))}
      </div>

      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, marginBottom: 18 }}>
        {bigButton(
          rollsLeft === 3 ? "Roll 🎲" : rollsLeft > 0 ? `Roll Again · ${rollsLeft} left` : "Pick a category",
          roll,
          rollsLeft === 0 || rolling
        )}
        {shakeStatus === "needsPermission" && (
          <button
            onClick={enableShake}
            style={{
              fontFamily: "inherit",
              fontSize: 13,
              fontWeight: 600,
              padding: "7px 16px",
              borderRadius: 999,
              border: "1px solid rgba(255,255,255,0.2)",
              background: "transparent",
              color: "rgba(245,243,250,0.7)",
              cursor: "pointer",
            }}
          >
            📳 Enable shake to roll
          </button>
        )}
      </div>

      {/* Scorecard */}
      <div
        style={{
          width: "100%",
          maxWidth: 420,
          background: "rgba(255,255,255,0.05)",
          border: "1px solid rgba(255,255,255,0.1)",
          borderRadius: 20,
          overflow: "hidden",
        }}
      >
        <div
          style={{
            padding: "9px 16px",
            fontSize: 12,
            fontWeight: 800,
            letterSpacing: "0.12em",
            color: "rgba(245,243,250,0.5)",
            background: "rgba(0,0,0,0.2)",
          }}
        >
          UPPER · {t.upperSum}/63 for the +35 bonus {t.upperBonus ? "✓ banked" : ""}
        </div>
        {UPPER.map((cat) => (
          <Row key={cat.key} cat={cat} />
        ))}
        <div
          style={{
            padding: "9px 16px",
            fontSize: 12,
            fontWeight: 800,
            letterSpacing: "0.12em",
            color: "rgba(245,243,250,0.5)",
            background: "rgba(0,0,0,0.2)",
          }}
        >
          LOWER
        </div>
        {LOWER.map((cat) => (
          <Row key={cat.key} cat={cat} />
        ))}
        {player.yahtzeeBonuses > 0 && (
          <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 16px", fontSize: 13, color: "#80ED99", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
            <span>Fahtzee bonuses × {player.yahtzeeBonuses}</span>
            <span style={{ fontWeight: 800 }}>+{player.yahtzeeBonuses * 100}</span>
          </div>
        )}
        <div
          style={{
            display: "flex",
            justifyContent: "space-between",
            padding: "13px 16px",
            fontWeight: 900,
            fontSize: 17,
            background: "rgba(0,0,0,0.3)",
          }}
        >
          <span>TOTAL</span>
          <span style={{ fontVariantNumeric: "tabular-nums", color: PLAYER_COLOURS[current] }}>{t.grand}</span>
        </div>
      </div>

      {/* Standings strip */}
      <div style={{ display: "flex", gap: 10, marginTop: 16, flexWrap: "wrap", justifyContent: "center" }}>
        {players.map((p, i) => (
          <div
            key={i}
            style={{
              background: "rgba(255,255,255,0.05)",
              border: `1px solid ${i === current ? PLAYER_COLOURS[i] : "rgba(255,255,255,0.1)"}`,
              borderRadius: 14,
              padding: "6px 12px",
              fontSize: 13,
              textAlign: "center",
              minWidth: 68,
            }}
          >
            <div style={{ color: PLAYER_COLOURS[i], fontWeight: 800 }}>{p.name}</div>
            <div style={{ fontVariantNumeric: "tabular-nums", fontWeight: 700 }}>{totalsFor(p).grand}</div>
          </div>
        ))}
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<Fahtzee />);
</script>
</body>
</html>
